<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Second Opinion History — Portility</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:#f9fafb;color:#111;padding:0}
    .header{background:#fff;border-bottom:1px solid #e5e7eb;padding:20px 32px;position:relative}
    .header-help{position:absolute;top:20px;right:32px}
    .header h1{font-size:20px;font-weight:700;color:#111}
    .header p{font-size:13px;color:#6b7280;margin-top:4px}
    .content{max-width:800px;margin:0 auto;padding:24px 32px}
    .empty{text-align:center;color:#9ca3af;font-size:14px;padding:60px 0}
    .history-item{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px 20px;margin-bottom:10px;transition:box-shadow 0.15s}
    .history-item:hover{box-shadow:0 2px 8px rgba(0,0,0,0.06)}
    .history-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .history-title{font-size:14px;font-weight:700;color:#111}
    .history-ais{font-size:12px;font-weight:500;color:#6b7280;margin-bottom:6px}
    .history-ais .platform-icon{display:inline-block;vertical-align:middle;margin:0 2px}
    .history-date{font-size:11px;color:#9ca3af}
    .history-summary{font-size:13px;color:#4b5563;line-height:1.5;margin-bottom:10px}
    .history-meta{display:flex;align-items:center;gap:10px}
    .score-pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
    .score-conflict{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
    .score-mixed{background:#fffbeb;color:#92400e;border:1px solid #fde68a}
    .score-agrees{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
    .type-pill{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb;text-transform:capitalize}
    .help-icon-link{display:inline-flex;align-items:center;color:#9ca3af;transition:color 0.2s;text-decoration:none;line-height:0}
    .help-icon-link:hover{color:#6b7280}
    .help-icon-link .help-icon-glyph{display:inline-block;width:16px;height:16px;background-color:currentColor;-webkit-mask:url('icons/help-icon.png') center / contain no-repeat;mask:url('icons/help-icon.png') center / contain no-repeat}
  </style>
</head>
<body>
  <div class="header">
    <a class="help-icon-link header-help" href="http://portility.ai/help" target="_blank" rel="noopener" title="Help"><span class="help-icon-glyph"></span></a>
    <h1>Second Opinion History</h1>
    <p>Your last 20 comparisons, stored locally.</p>
  </div>
  <div class="content" id="historyContent">
    <div class="empty">Loading...</div>
  </div>

  <script src="indexeddb.js"></script>
  <script src="so-history.js"></script>
</body>
</html>
