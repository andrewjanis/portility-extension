<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Second Opinion — Portility</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;max-width:900px;margin:0 auto;padding:0 24px 32px;color:#111;line-height:1.6}
    .page-header{padding:20px 0 16px;border-bottom:1px solid #e5e7eb;margin-bottom:20px}
    .page-header img{height:32px;width:auto}
    .score-section{text-align:center;margin-bottom:20px}
    .score-number{font-size:48px;font-weight:700;line-height:1}
    .score-pct{font-size:20px;font-weight:500}
    .score-label{font-size:13px;color:#6b7280;margin-top:2px}
    .likert-wrap{text-align:center;margin-bottom:24px}
    .likert-label{font-size:12px;font-weight:600;color:#374151;margin-bottom:8px}
    .likert-row{display:flex;justify-content:center;gap:10px}
    .likert-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #d1d5db;background:#fff;font-size:13px;font-weight:600;color:#6b7280;cursor:pointer;transition:all 0.15s}
    .likert-btn:hover{border-color:#14b8a6;color:#0d9488;background:#f0fdfa}
    .likert-btn.selected{border-color:#14b8a6;background:#14b8a6;color:#fff}
    .likert-btn.submitted{pointer-events:none;opacity:0.7}
    .likert-anchors{display:flex;justify-content:space-between;max-width:220px;margin:4px auto 0;font-size:10px;color:#9ca3af}
    .likert-status{font-size:11px;margin-top:6px;min-height:16px}
    .summary{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:16px 20px;margin-bottom:24px;font-size:14px;color:#374151;line-height:1.6}
    table{width:100%;border-collapse:collapse;margin-top:8px}
    thead th{text-align:left;font-size:12px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:0.5px;padding:10px 14px;border-bottom:2px solid #e5e7eb;background:#f9fafb}
    thead th.ai-col{width:30%}
    tbody tr{border-bottom:1px solid #f3f4f6}
    tbody tr:hover{background:#fafbfc}
    .theme-cell{padding:14px;vertical-align:top;width:40%}
    .theme-cell strong{font-size:14px;color:#111;display:block;margin-bottom:4px}
    .theme-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;display:inline-block;margin-bottom:6px}
    .theme-desc{font-size:12px;color:#6b7280;line-height:1.5}
    .quote-cell{padding:14px;vertical-align:top;font-size:13px;color:#374151;line-height:1.55}
    .quote-text{font-style:italic;color:#4b5563}
    .loading{text-align:center;padding:80px 32px;color:#6b7280;font-size:14px}
  </style>
</head>
<body>
  <div id="loadingState" class="loading">Loading comparison data...</div>
  <div id="comparisonContent" style="display:none;">
    <div class="page-header">
      <a href="https://portility.ai" target="_blank" rel="noopener"><img src="icons/logo-portility-ai.png" alt="Portility AI"></a>
    </div>
    <div class="score-section">
      <span class="score-number" id="scoreNumber"></span>
      <span class="score-pct" id="scorePct">%</span>
      <div class="score-label">Agreement Score</div>
    </div>
    <div class="likert-wrap">
      <div class="likert-label">Rate this comparison</div>
      <div class="likert-row">
        <button class="likert-btn" data-rating="1" title="Poor">1</button>
        <button class="likert-btn" data-rating="2" title="Fair">2</button>
        <button class="likert-btn" data-rating="3" title="Good">3</button>
        <button class="likert-btn" data-rating="4" title="Very Good">4</button>
        <button class="likert-btn" data-rating="5" title="Excellent">5</button>
      </div>
      <div class="likert-anchors"><span>Poor</span><span>Excellent</span></div>
      <div class="likert-status" id="likertStatus"></div>
    </div>
    <div class="summary" id="interpretation"></div>
    <table>
      <thead><tr>
        <th>Theme</th>
        <th class="ai-col" id="ai1Header">AI 1</th>
        <th class="ai-col" id="ai2Header">AI 2</th>
      </tr></thead>
      <tbody id="themeRows"></tbody>
    </table>
  </div>
  <script src="comparison.js"></script>
</body>
</html>
